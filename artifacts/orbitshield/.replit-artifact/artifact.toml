kind = "web"
previewPath = "/"
title = "Yörünge Kalkanı Yapay Zeka"
version = "1.0.0"
id = "artifacts/orbitshield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26203

[services.development]
run = "pnpm --filter @workspace/orbitshield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orbitshield", "run", "build" ]
publicDir = "artifacts/orbitshield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26203"
BASE_PATH = "/"
